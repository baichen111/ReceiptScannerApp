name: ReceiptScannerApp
options:
  bundleIdPrefix: com.baichen
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  ReceiptScannerApp:
    type: application
    platform: iOS
    sources:
      - ReceiptScannerApp
    settings:
      base:
        INFOPLIST_FILE: ReceiptScannerApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.baichen.ReceiptScannerApp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    info:
      path: ReceiptScannerApp/Info.plist
      properties:
        NSCameraUsageDescription: "We need camera access to scan receipts"
        NSPhotoLibraryUsageDescription: "We need photo library access to select receipt images"
        UILaunchScreen: {}
